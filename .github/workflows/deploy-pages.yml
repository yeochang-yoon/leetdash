name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect pull request scope
        id: pr-scope
        if: github.event_name == 'pull_request'
        run: |
          node scripts/validate-submission-pr.mjs \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --author "${{ github.event.pull_request.user.login }}"

      - name: Finish submission-only validation
        if: github.event_name == 'pull_request' && steps.pr-scope.outputs.submission_only == 'true'
        run: echo "Submission-only PR validated; skipping application CI."

      - name: Setup Node
        if: github.event_name != 'pull_request' || steps.pr-scope.outputs.submission_only != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.pr-scope.outputs.submission_only != 'true'
        run: npm ci

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' || steps.pr-scope.outputs.submission_only != 'true'
        uses: actions/configure-pages@v5

      - name: Typecheck
        if: github.event_name != 'pull_request' || steps.pr-scope.outputs.submission_only != 'true'
        run: npm run typecheck

      - name: Test
        if: github.event_name != 'pull_request' || steps.pr-scope.outputs.submission_only != 'true'
        run: npm test

      - name: Build static site
        if: github.event_name != 'pull_request' || steps.pr-scope.outputs.submission_only != 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /leetdash
          SOURCE_REPOSITORY_URL: https://github.com/whoisyourbias/leetdash
          BRANCH: master

      - name: Disable Jekyll
        if: github.event_name != 'pull_request'
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
