name: OpenCode Submission Review

on:
  workflow_run:
    workflows: ["Deploy GitHub Pages"]
    types:
      - completed

permissions: {}

concurrency:
  group: opencode-review-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout trusted pull-request base
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.pull_requests[0].base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Run trusted OpenCode review
        run: |
          node scripts/opencode-review.mjs \
            --base "${{ github.event.workflow_run.pull_requests[0].base.sha }}" \
            --head "${{ github.event.workflow_run.pull_requests[0].head.sha }}" \
            --pull-number "${{ github.event.workflow_run.pull_requests[0].number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_REVIEW_MODEL: ${{ vars.OPENCODE_REVIEW_MODEL }}
